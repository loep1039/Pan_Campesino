<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Torta de Naranja Pro - Minimalista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(51, 65, 85, 0.1), 0 8px 10px -6px rgba(51, 65, 85, 0.1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="p-2 md:p-6 font-sans text-slate-800">
    <div class="max-w-2xl mx-auto">
        <div class="bg-slate-700 rounded-t-2xl p-5 text-white shadow-lg text-center">
            <h1 class="text-3xl font-extrabold uppercase tracking-wider">Torta de Naranja</h1>
            <p class="text-gray-100 text-[10px] font-medium tracking-widest uppercase">Fernando Araujo - Calculadora de Pesos Pro</p>
        </div>

        <div class="bg-white rounded-b-2xl card-shadow border border-slate-100 p-4 md:p-6">
            
            <div class="flex p-1 bg-gray-50 rounded-xl mb-6">
                <button onclick="setShape('cuadrado')" id="btn-cuadrado" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all bg-white border border-slate-200 text-slate-900 shadow">CUADRADA</button>
                <button onclick="setShape('redondo')" id="btn-redondo" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-gray-500 uppercase">REDONDA</button>
            </div>

            <section class="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6">
                <h3 id="label-dimensiones" class="text-slate-800 font-bold text-[10px] uppercase mb-3 tracking-wider">Dimensiones (cm)</h3>
                <div id="inputs-container" class="grid grid-cols-2 gap-3">
                    </div>
            </section>

            <div class="bg-white overflow-hidden">
                <table class="w-full">
                    <thead>
                        <tr class="text-gray-400 text-[9px] uppercase tracking-widest border-b border-gray-100">
                            <th class="px-2 py-2 text-left font-bold w-8">#</th>
                            <th class="px-2 py-2 text-left font-bold">Ingrediente</th>
                            <th class="px-2 py-2 text-right font-bold">Cantidad (g)</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body" class="divide-y divide-gray-50">
                        </tbody>
                    <tfoot>
                        <tr class="border-t border-slate-100 bg-white">
                            <td colspan="2" class="px-4 py-4 text-slate-600 font-medium text-sm rounded-bl-xl">Peso Total Masa</td>
                            <td id="total-gramos" class="px-4 py-4 text-right font-black text-2xl rounded-br-xl text-slate-700">0 g</td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <div class="mt-6 flex flex-col gap-3">
                <button onclick="copyToClipboard()" class="w-full bg-slate-800 hover:bg-slate-950 active:scale-[0.98] text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2 text-sm shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>
                    COPIAR INGREDIENTES
                </button>
            </div>
        </div>

        <p class="mt-4 text-[10px] text-gray-400 text-center uppercase tracking-widest font-medium">DISEÑADO POR FERNANDO ARAUJO • FLUJO DE PRODUCCIÓN RÁPIDA • 2026</p>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-3 rounded-full text-xs font-bold opacity-0 transition-opacity pointer-events-none z-50 shadow-2xl">
        ¡LISTA COPIADA!
    </div>

    </body>
</html>
